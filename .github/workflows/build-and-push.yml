name: Build and push container image

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      push:
        description: "Push image even on workflow_dispatch (default: only on main branch pushes)"
        required: false
        default: "false"
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # id-token for future keyless signing if desired
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        # Only login/push on main pushes or explicit workflow_dispatch with push=true
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event.inputs.push == 'true')
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=schedule,pattern={{date 'YYYYMMDD'}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Containerfile
          push: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event.inputs.push == 'true') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build for host platforms commonly used by developers (amd64 + arm64)
          platforms: linux/amd64,linux/arm64

      - name: Summary
        run: |
          echo "Built image(s): ${{ steps.meta.outputs.tags }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"

  build-dl-cache:
    name: Build and push DL cache image
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event.inputs.push == 'true')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if dl cache needs update
        id: check-dl
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release list --repo themactep/thingino-firmware --json name,tagName | jq -r '.[] | select(.name=="buildroot-dl-cache") | .tagName' | sort -r | head -1)
          if [ -z "$TAG" ]; then
            echo "No buildroot-dl-cache release found. Nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Upstream dl release: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          CURRENT_TAG=$(docker pull ghcr.io/${{ github.repository_owner }}/thingino-dl:latest 2>/dev/null && docker inspect ghcr.io/${{ github.repository_owner }}/thingino-dl:latest --format '{{index .Config.Labels "dl.source.release"}}' 2>/dev/null || echo "none")
          echo "Current image label: $CURRENT_TAG"

          if [ "$CURRENT_TAG" = "$TAG" ]; then
            echo "DL cache is current. Skipping rebuild."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "DL cache needs rebuild."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download dl from thingino-firmware release
        if: steps.check-dl.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.check-dl.outputs.tag }}"
          echo "Downloading dl cache release: $TAG"
          mkdir -p workspace /tmp/dl-cache
          gh release download "$TAG" --repo themactep/thingino-firmware --pattern "buildroot-dl-cache*" --dir "/tmp/dl-cache"
          cd workspace
          7z x /tmp/dl-cache/buildroot-dl-cache.zip.001 -y
          if [ -d dl/dl ]; then
            mv dl/dl/* dl/
            rm -rf dl/dl
          fi

      - name: Prune git sources
        if: steps.check-dl.outputs.skip != 'true'
        run: ./prune-dl.sh workspace/dl

      - name: Build and push DL cache image
        if: steps.check-dl.outputs.skip != 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./workspace
          file: ./Containerfile.dl
          build-args: |
            DL_SOURCE_RELEASE=${{ steps.check-dl.outputs.tag }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/thingino-dl:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
