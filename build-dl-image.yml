name: Build DL cache image

on:
  workflow_dispatch:
    inputs:
      dl_source:
        type: choice
        description: 'Source of dl/ directory'
        required: true
        default: 'workspace'
        options:
          - workspace
          - release

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/thingino-dl

jobs:
  build-dl-image:
    name: Build DL cache image
    runs-on: ubuntu-26.04
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.branch || 'master' }}

      - name: Download dl from release
        if: github.event.inputs.dl_source == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          RELEASE_TAG=$(gh release list --repo "$REPO" --json name,tagName | jq -r '.[] | select(.name=="buildroot-dl-cache") | .tagName' | sort -r | head -1)
          if [ -z "$RELEASE_TAG" ]; then
            echo "No buildroot-dl-cache release found"
            exit 1
          fi
          echo "Downloading from release: $RELEASE_TAG"
          mkdir -p /tmp/dl-cache
          gh release download "$RELEASE_TAG" --repo "$REPO" --pattern "buildroot-dl-cache*" --dir "/tmp/dl-cache"
          cd workspace
          7z x /tmp/dl-cache/buildroot-dl-cache.zip.001 -y
          if [ -d dl/dl ]; then
            mv dl/dl/* dl/
            rm -rf dl/dl
          fi

      - name: Prune git sources from dl
        run: ./prune-dl.sh workspace/dl

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value={{date 'YYYYMMDD'}}

      - name: Build and push DL image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile.dl
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
